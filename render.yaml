services:
  - type: web
    name: khamanon-digital-twin
    env: python
    region: singapore           # closest to Punjab/India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: cron
    name: khamanon-daily-updater
    env: python
    region: singapore
    plan: free
    schedule: "0 2 * * *"      # 02:00 UTC = 07:30 IST daily
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/realtime_updater.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEE_CREDENTIALS
        sync: false             # set manually in Render dashboard → Environment
