services:
  - type: web
    name: khamanon-digital-twin
    env: python
    region: singapore           # closest to Punjab/India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 1 --threads 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

# NOTE: the daily pipeline now runs in GitHub Actions
# (.github/workflows/daily-update.yml), which commits refreshed data back to
# the repo and triggers Render's auto-deploy. The Render cron service was never
# created (it required card verification) and has been removed.
